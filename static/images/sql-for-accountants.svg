<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">SQL for Accountants</title>
  <desc id="desc">Placeholder course thumbnail for SQL for Accountants.</desc>
  <defs>
